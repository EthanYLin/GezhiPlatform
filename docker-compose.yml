version: "3.9"

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gezhi-platform-frontend
    restart: unless-stopped
    ports:
      - "7001:3000"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - internal
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gezhi-platform-backend
    restart: unless-stopped
    ports:
      - "7002:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Shanghai
    depends_on:
      - db
    networks:
      - internal

  db:
    image: mysql:8
    container_name: gezhi-platform-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=db
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
      - TZ=Asia/Shanghai
    ports:
      - "7003:3306"
    volumes:
      - database-data:/var/lib/mysql
    networks:
      - internal

volumes:
  database-data:

networks:
  internal:
    driver: bridge